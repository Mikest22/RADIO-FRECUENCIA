<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Walkie-Talkie Online</title>

<style>
*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}
html,body{
  margin:0;
  padding:0;
  width:100%;
  min-height:100%;
  font-family:Arial,sans-serif;
  background:#061527;
  color:white;
}
body{
  display:flex;
  justify-content:center;
  align-items:center;
  padding:15px;
}
.card{
  width:100%;
  max-width:430px;
  background:#183b64;
  border-radius:26px;
  padding:20px;
  text-align:center;
}
h1{
  margin:5px 0 20px;
  font-size:32px;
}
input{
  width:100%;
  padding:16px;
  border:none;
  border-radius:18px;
  font-size:18px;
  text-align:center;
  margin:10px 0;
}
button{
  border:none;
  color:white;
  font-weight:bold;
}
.smallBtn{
  width:220px;
  padding:18px;
  border-radius:18px;
  font-size:18px;
  margin:12px auto;
  display:block;
}
.copy{
  background:#95a5a6;
}
.connect{
  background:#2ecc71;
}
hr{
  border:1px solid rgba(255,255,255,.35);
  margin:20px 0;
}
#talkBtn{
  width:250px;
  height:250px;
  border-radius:50%;
  background:#ef3340;
  font-size:42px;
  box-shadow:0 12px 0 #8d1520;
  margin:20px auto;
  display:block;
}
#talkBtn:active{
  transform:translateY(8px);
  box-shadow:0 3px 0 #8d1520;
}
#status{
  color:#ffd166;
  font-size:24px;
  margin:15px 0;
}
#info{
  color:#dfe6e9;
  font-size:18px;
}
</style>
</head>

<body>

<div class="card">
  <h1>📻 Walkie-Talkie</h1>

  <p>Tu ID:</p>
  <input id="myId" readonly value="Generando ID...">

  <button class="smallBtn copy" onclick="copyMyId()">COPIAR MI ID</button>

  <hr>

  <p>ID del otro celular:</p>
  <input id="remoteId" placeholder="Pega aquí el ID del otro">

  <button class="smallBtn connect" onclick="connectPeer()">CONECTAR</button>

  <hr>

  <button id="talkBtn">HABLAR</button>

  <div id="status">Iniciando...</div>

  <div id="info">
    Mantén presionado HABLAR y suelta para dejar de transmitir.
  </div>
</div>

<audio id="remoteAudio" autoplay playsinline></audio>

<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.5/dist/peerjs.min.js"></script>

<script>
let peer;
let conn;
let mediaCall;
let localStream = null;
let remotePeerId = "";
let isTalking = false;

const myId = document.getElementById("myId");
const remoteIdInput = document.getElementById("remoteId");
const talkBtn = document.getElementById("talkBtn");
const statusDiv = document.getElementById("status");
const remoteAudio = document.getElementById("remoteAudio");

function setStatus(text){
  statusDiv.innerText = text;
}

async function prepareMic(){
  if(localStream) return localStream;

  localStream = await navigator.mediaDevices.getUserMedia({
    audio:{
      echoCancellation:true,
      noiseSuppression:true,
      autoGainControl:true
    },
    video:false
  });

  localStream.getAudioTracks().forEach(track=>{
    track.enabled = false;
  });

  return localStream;
}

function playRemoteStream(remoteStream){
  remoteAudio.srcObject = remoteStream;
  remoteAudio.volume = 1;
  remoteAudio.muted = false;

  const playPromise = remoteAudio.play();

  if(playPromise !== undefined){
    playPromise
      .then(()=>{
        setStatus("Conectado. Audio listo.");
      })
      .catch(()=>{
        setStatus("Toca HABLAR una vez para activar el audio.");
      });
  }
}

peer = new Peer();

peer.on("open", id=>{
  myId.value = id;
  setStatus("Listo. Comparte tu ID.");
});

peer.on("connection", connection=>{
  conn = connection;
  remotePeerId = connection.peer;

  conn.on("open", ()=>{
    setStatus("Conectado.");
  });

  conn.on("data", data=>{
    if(data.type === "talking"){
      setStatus("Recibiendo audio...");
    }

    if(data.type === "stopped"){
      setStatus("Conectado.");
    }
  });
});

peer.on("call", async call=>{
  try{
    await prepareMic();

    mediaCall = call;

    call.answer(localStream);

    call.on("stream", remoteStream=>{
      playRemoteStream(remoteStream);
    });

    call.on("close", ()=>{
      setStatus("Llamada cerrada.");
    });

  }catch(error){
    setStatus("Permite el micrófono.");
  }
});

peer.on("error", error=>{
  setStatus("Error: " + error.type);
});

async function connectPeer(){
  remotePeerId = remoteIdInput.value.trim();

  if(!remotePeerId){
    setStatus("Pega primero el ID del otro celular.");
    return;
  }

  try{
    await prepareMic();

    conn = peer.connect(remotePeerId);

    conn.on("open", ()=>{
      setStatus("Conectado.");

      mediaCall = peer.call(remotePeerId, localStream);

      mediaCall.on("stream", remoteStream=>{
        playRemoteStream(remoteStream);
      });

      mediaCall.on("close", ()=>{
        setStatus("Llamada cerrada.");
      });
    });

    conn.on("error", ()=>{
      setStatus("No se pudo conectar.");
    });

  }catch(error){
    setStatus("No se pudo activar el micrófono.");
  }
}

function startTalking(){
  if(!localStream){
    setStatus("Primero presiona CONECTAR.");
    return;
  }

  isTalking = true;

  localStream.getAudioTracks().forEach(track=>{
    track.enabled = true;
  });

  if(conn && conn.open){
    conn.send({type:"talking"});
  }

  setStatus("Transmitiendo...");
}

function stopTalking(){
  if(!localStream) return;

  isTalking = false;

  localStream.getAudioTracks().forEach(track=>{
    track.enabled = false;
  });

  if(conn && conn.open){
    conn.send({type:"stopped"});
  }

  setStatus("Conectado.");
}

async function copyMyId(){
  try{
    await navigator.clipboard.writeText(myId.value);
    setStatus("ID copiado.");
  }catch{
    myId.select();
    document.execCommand("copy");
    setStatus("ID copiado.");
  }
}

talkBtn.addEventListener("touchstart", e=>{
  e.preventDefault();
  startTalking();
});

talkBtn.addEventListener("touchend", e=>{
  e.preventDefault();
  stopTalking();
});

talkBtn.addEventListener("touchcancel", e=>{
  e.preventDefault();
  stopTalking();
});

talkBtn.addEventListener("mousedown", e=>{
  e.preventDefault();
  startTalking();
});

talkBtn.addEventListener("mouseup", e=>{
  e.preventDefault();
  stopTalking();
});

talkBtn.addEventListener("mouseleave", e=>{
  e.preventDefault();
  stopTalking();
});
</script>

</body>
</html>
